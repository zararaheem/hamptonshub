<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 144" fill="#2E9BFF">
  <!-- bowl-shaped crossbar (concave up, like the emoji) -->
  <path d="M46 88 Q100 116 154 88 L154 99 Q100 128 46 99 Z"/>
  <!-- short shaft -->
  <rect x="94" y="112" width="12" height="24" rx="6"/>
  <!-- prongs: centre straight, outer two bow outward -->
  <g fill="none" stroke="#2E9BFF" stroke-width="12" stroke-linecap="round">
    <path d="M100 110 V44"/>
    <path d="M60 100 C50 78 52 56 62 44"/>
    <path d="M140 100 C150 78 148 56 138 44"/>
  </g>
  <!-- arrowheads: centre points up (both barbs); sides point outward (one barb each) -->
  <g fill="#2E9BFF">
    <g transform="translate(100 44)"><path d="M0 -28 L-16 7 L0 -6 L16 7 Z"/></g>
    <g transform="translate(62 46) rotate(-16)"><path d="M0 -28 L-17 7 L0 -5 Z"/></g>
    <g transform="translate(138 46) rotate(16)"><path d="M0 -28 L17 7 L0 -5 Z"/></g>
  </g>
</svg>
